<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星球探索</title>
    <link rel="stylesheet" href="SEstyle.css">
</head>
<body>

    <div class="wrapper">
        <header class="top-nav">
            <a href="index.html" class="logo-link">
                <img src="logo.png" alt="商標" class="logo-img">
            </a>
            <nav class="menu">
                <a href="SEindex.html" class="menu-item">主頁</a>
                <a href="SEplanets.html" class="menu-item">星球</a>
                <a href="SEother.html" class="menu-item">星座</a>
                <a href="SEabout.html" class="menu-item">關於</a>
            </nav>
        </header>

        <main class="content-area">
            <div class="main-container">
                
                <div class="announcement-board">
                    <div class="announcement-track">
                        <div class="news-item">✨ 今日運勢已更新，快來查看你的星球星象！</div>
                        <div class="news-item">🚀 太陽系探索：火星新照片已上傳。</div>
                        <div class="news-item">🔭 提示：點擊下方圓點可切換看板。</div>
                    </div>
                </div>

               <div class="slider-container">
                    <div class="slider" id="main-slider">
                         <div class="slide">
                            <img id="nasa-img" src="https://via.placeholder.com/1000x500/0a0515/ffffff?text=Loading+Universe..." alt="每日太空照片">
                            <div class="slide-text" id="nasa-title">今日太空照片載入中...</div>
                         </div>
                        <div class="slide">
                            <a href="SEother.html" class="slide-link"></a>
                             <img src="images/sign.png" alt="看板1">
                             <div class="slide-text">今日運勢：點擊查看</div>
                        </div>
                        <div class="slide">
                            <img src="https://via.placeholder.com/1000x500/0b3d91/ffffff?text=Slide+2" alt="看板2">
                            <div class="slide-text">探索太陽系秘辛</div>
                        </div>
                        <div class="slide">
                            <img src="https://via.placeholder.com/1000x500/333333/ffffff?text=Slide+3" alt="看板3">
                            <div class="slide-text">更多神秘宇宙訊息</div>
                        </div>
                    </div>

                    <div class="slider-nav">
                        <div class="dot active" onclick="goToSlide(0)"></div>
                        <div class="dot" onclick="goToSlide(1)"></div>
                        <div class="dot" onclick="goToSlide(2)"></div>
                        <div class="dot" onclick="goToSlide(3)"></div>
                    </div>
                </div>

            </div>
        </main>

        <footer class="bottom-footer">
            <div class="footer-grid">
                 <div class="footer-item">DC: <span>yukixiyu</span></div>
            <div class="footer-item">IG: <span>YukixiYu</span></div>
            <div class="footer-item">Gmail: <span>b067941536@gmail.com</span></div>
            <div class="footer-item">Number: <span>**********</span></div>
            </div>
        </footer>
    </div>

    <script>
        const slider = document.getElementById('main-slider');
        const dots = document.querySelectorAll('.dot');
        let currentIndex = 0;

        function updateDots(index) {
            dots.forEach(dot => dot.classList.remove('active'));
            dots[index].classList.add('active');
        }

        function goToSlide(index) {
            currentIndex = index;
            const width = slider.clientWidth;
            slider.scrollTo({
                left: width * index,
                behavior: 'smooth'
            });
            updateDots(index);
        }

        // 自動輪播
        function autoPlay() {
            currentIndex = (currentIndex + 1) % dots.length;
            goToSlide(currentIndex);
        }

        let timer = setInterval(autoPlay, 5000);

        // 使用者手動滑動後更新圓點
        slider.addEventListener('scroll', () => {
            const index = Math.round(slider.scrollLeft / slider.clientWidth);
            updateDots(index);
            currentIndex = index;
        });
    
        // 優化後：抓取 NASA 每日太空照片
        async function updateDailySpacePhoto() {
            try {
                // 正確的 API Key 與請求網址 (已加入 thumbs=true 參數以應對影片格式)
                const apiKey = 'bbnI97f3gYfi5VjW3flIMexoyBF18Ca86rbJDXh5';
                const apiUrl = `https://api.nasa.gov/planetary/apod?api_key=${apiKey}&thumbs=true`;

                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('API request failed');
                
                const data = await response.json();

                const imgElement = document.getElementById('nasa-img');
                const titleElement = document.getElementById('nasa-title');

                if (data.media_type === 'image') {
                    // 正常照片情況
                    imgElement.src = data.url; 
                    titleElement.innerText = "今日太空：" + data.title;
                } else if (data.media_type === 'video') {
                    // 若今日是影片，使用 API 回傳的縮圖或指定備用圖
                    imgElement.src = data.thumbnail_url || "https://images-assets.nasa.gov/image/PIA12348/PIA12348~medium.jpg";
                    titleElement.innerText = "今日影音：" + data.title + " (點擊查看影片)";
                }
            } catch (error) {
                console.log("NASA 照片載入失敗，使用備用背景：", error);
                document.getElementById('nasa-img').src = "https://via.placeholder.com/1000x500/0a0515/ffffff?text=Universe+Is+Waiting";
                document.getElementById('nasa-title').innerText = "今日太空：探索無盡深空";
            }
        }

        // 確保網頁一打開就去抓圖
        window.addEventListener('DOMContentLoaded', updateDailySpacePhoto);
    </script>
</body>
</html>
