<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星球探索 - 完整系統</title>
    <link rel="stylesheet" href="SEstyle.css">
    <style>
        /* --- 核心修改：轉場遮罩設定 --- */
        #page-transition {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #0a0515, #1a0b35, #0a0515, #0d1a3a, #0a0515, #0a122a);
            background-size: 400% 400%;
            z-index: 10001;
            pointer-events: none;
            display: none; /* 預設隱藏，確保進場無動畫 */
            opacity: 0;
            justify-content: center;
            align-items: center;
            transition: opacity 1.2s cubic-bezier(0.3, 0.5, 0.4, 1);
            animation: nebulaGentleFlow 25s linear infinite; 
        }

        #page-transition.active {
            display: flex;
            opacity: 1;
        }

        @keyframes nebulaGentleFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .loader-text {
            color: #66b3ff;
            font-family: 'Segoe UI', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 8px;
            text-shadow: 0 0 15px rgba(102, 179, 255, 0.6);
            animation: blink 2.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 畫布特效層 */
        #magic-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        body {
            cursor: crosshair;
            background-color: #0a0515;
            overflow-x: hidden;
        }

        .wrapper {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div id="page-transition">
        <div class="loader-text">WARPING...</div>
    </div>

    <canvas id="magic-canvas"></canvas>

    <div class="wrapper">
        <header class="top-nav">
            <a href="index.html" class="logo-link">
                <div class="logo-img" style="width:55px;height:55px;background:#66b3ff;"></div>
            </a>
            <nav class="menu">
                <a href="index.html" class="menu-item">主頁</a>
                <a href="SEplanets.html" class="menu-item">星球</a>
                <a href="SEother.html" class="menu-item">星座</a>
                <a href="SEfortune.html" class="menu-item">神社</a>
                <a href="SEabout.html" class="menu-item">關於</a>
            </nav>
        </header>

        <main class="content-area">
            <div id="galaxy-menu" class="galaxy-map-container">
                <div class="system-box" onclick="showSolarDetail()">
                    <h2 class="system-title">太陽系（點擊進入）</h2>
                    <div class="solar-model">
                        <div class="sun-core"></div>
                        <div class="orb orb-mercury"><div class="p-dot"></div></div>
                        <div class="orb orb-earth"><div class="p-dot"></div></div>
                        <div class="asteroid-ring"></div>
                    </div>
                </div>

                <div class="system-box">
                    <h2 class="system-title">仙女座星系</h2>
                    <div class="andromeda-model">
                        <div class="galaxy-center"></div>
                        <div class="spiral-arms"></div>
                        <div class="spiral-arms delay"></div>
                    </div>
                </div>
            </div>

            <div id="solar-detail-grid" class="planet-grid-container" style="display:none;">
                <div class="grid-header">
                    <button class="back-btn" onclick="hideSolarDetail()">← 返回</button>
                    <h2 style="color:#66b3ff;">太陽系成員全覽</h2>
                </div>

                <div class="planet-grid">
                    <a href="planet/planet_sun.html" class="planet-card">
                        <div class="card-viz"><div class="sun-card-viz"></div></div>

                    <a href="planet/planet_venus.html" class="planet-card">

                        <div class="card-info"><h3>金星</h3><p>高溫行星</p></div>
                    </a>
                    <a href="planet/planet_earth.html" class="planet-card">
                        <div class="card-viz"><div class="inner-path path-earth"><div class="sphere sphere-earth"></div></div></div>
                        <div class="card-info"><h3>地球</h3><p>我們的家園</p></div>

    <script>
        // --- 轉場動畫邏輯 (精簡即時版) ---
        window.addEventListener('DOMContentLoaded', () => {
            const transitionLayer = document.getElementById('page-transition');
            
            // 選取所有星球卡片
            const planetCards = document.querySelectorAll('.planet-card');
            
            planetCards.forEach(card => {
                card.addEventListener('click', (e) => {
                    // 檢查連結是否有效且屬於本站
                    if (card.href && card.href.includes(window.location.host)) {
                        e.preventDefault();
                        const targetUrl = card.href;

                        // 顯示並觸發動畫
                        transitionLayer.style.display = 'flex';
                        requestAnimationFrame(() => {
                            transitionLayer.classList.add('active');
                        });

                        setTimeout(() => {
                            window.location.href = targetUrl;
                        }, 1200);
                    }
                });
            });
            // 導覽列 (.menu-item) 不會被監聽到，所以會秒切換，符合需求。
        });

        // --- 特效邏輯：游標星塵與點擊星雲 (保持不變) ---
        const canvas = document.getElementById('magic-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [], clickRipples = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('mousemove', (e) => {
            for (let i = 0; i < 3; i++) particles.push(new Particle(e.clientX, e.clientY));
        });

        window.addEventListener('click', (e) => {
            clickRipples.push(new Ripple(e.clientX, e.clientY));
            for(let i=0; i<8; i++) particles.push(new Particle(e.clientX, e.clientY, true)); 
        });

        // Particle & Ripple 類別 (這裡省略，與你提供的代碼完全一致)
        class Particle {
            constructor(x, y, isClickStar = false) {
                this.x = x; this.y = y; this.isClickStar = isClickStar;
                const hue = isClickStar ? 280 : (Math.random() < 0.8 ? 50 : 280); 
                this.color = `hsla(${hue}, 90%, 70%, `; 
                this.size = isClickStar ? Math.random() * 4 + 2 : Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * (isClickStar ? 4 : 1.5);
                this.speedY = isClickStar ? (Math.random() * -3 - 1) : (Math.random() * -1 - 0.2);
                this.life = 1; this.decay = isClickStar ? 0.015 : Math.random() * 0.02 + 0.01;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if(this.isClickStar) { this.speedX *= 0.98; this.speedY *= 0.98; }
                this.life -= this.decay; if(this.life < 0) this.life = 0;
            }
            draw() {
                ctx.globalCompositeOperation = 'lighter';
                ctx.fillStyle = this.color + this.life + ')';
                ctx.beginPath();
                if(this.isClickStar) {
                    this.drawStar(ctx, this.x, this.y, 4, this.size, this.size/2);
                } else {
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                }
                ctx.fill();
                ctx.globalCompositeOperation = 'source-over';
            }
            drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
                let rot = Math.PI / 2 * 3, step = Math.PI / spikes;
                ctx.beginPath(); ctx.moveTo(cx, cy - outerRadius);
                for (let i = 0; i < spikes; i++) {
                    ctx.lineTo(cx + Math.cos(rot) * outerRadius, cy + Math.sin(rot) * outerRadius);
                    rot += step;
                    ctx.lineTo(cx + Math.cos(rot) * innerRadius, cy + Math.sin(rot) * innerRadius);
                    rot += step;
                }
                ctx.closePath();
            }
        }

        class Ripple {
            constructor(x, y) {
                this.x = x; this.y = y; this.radius = 1; this.maxRadius = 70;
                this.color = 'hsla(280, 90%, 60%, ';
                this.life = 1; this.decay = 0.025;
            }
            update() {
                this.radius += (this.maxRadius - this.radius) * 0.1;
                this.life -= this.decay; if(this.life < 0) this.life = 0;
            }
            draw() {
                ctx.strokeStyle = this.color + this.life + ')';
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.stroke();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach((p, i) => { p.update(); p.draw(); if(p.life <= 0) particles.splice(i, 1); });
            clickRipples.forEach((r, i) => { r.update(); r.draw(); if(r.life <= 0) clickRipples.splice(i, 1); });
            requestAnimationFrame(animate);
        }
        animate();

        // 頁面切換邏輯
        function showSolarDetail() {
            document.getElementById('galaxy-menu').style.display = 'none';
            document.getElementById('solar-detail-grid').style.display = 'block';
        }
        function hideSolarDetail() {
            document.getElementById('galaxy-menu').style.display = 'flex';
            document.getElementById('solar-detail-grid').style.display = 'none';
        }
    </script>
</body>
