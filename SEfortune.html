<head>
    <meta charset="UTF-8">

    <title>星球探索 - 四元素神社系統</title>
    <link rel="stylesheet" href="SEstyle.css">
    <style>
        :root {
            --theme-color: #7dd3fc;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        body {
            margin: 0;
            overflow-x: hidden;
            background-color: #05070a;
            color: #e0e0e0;
            font-family: 'PingFang TC', sans-serif;
            cursor: crosshair;
        }

        /* --- 修正處：提升層級並確保不擋住按鈕 --- */
        #magic-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; /* 重要：讓點擊穿透到下面的按鈕 */
            z-index: 9999;       /* 確保粒子在最上層 */
        }

        .wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- 入口卡片設計 --- */
        #entry-system {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            padding: 120px 40px 60px;
        }

        .element-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
        }

        .element-card:hover {
            transform: translateY(-12px);
            background: rgba(255,255,255,0.08);
            border-color: var(--theme-color);
            box-shadow: 0 0 30px var(--theme-color);
        }

        .icon-box { width: 80px; height: 80px; margin: 0 auto 20px; position: relative; display: flex; align-items: center; justify-content: center; }
        .fire { background: radial-gradient(circle, #ff4d4d, transparent); animation: pulse 1.5s infinite; border-radius: 50%; width: 50px; height: 50px; }
        .earth { width: 45px; height: 45px; border: 4px solid #ffcc66; border-radius: 10px; animation: rotate 10s linear infinite; box-shadow: 0 0 15px #ffcc66; }
        .water { width: 50px; height: 50px; border-radius: 40% 60% 70% 30% / 40% 50% 60% 40%; background: #4da6ff; animation: morph 3s infinite alternate; }
        .wind { width: 50px; height: 50px; border: 2px dashed #99ffcc; border-radius: 50%; animation: rotate 3s linear infinite; }

        @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.6; } 100% { transform: scale(1.3); opacity: 0; } }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes morph { from { border-radius: 40% 60% 70% 30%; } to { border-radius: 70% 30% 30% 70%; } }

        /* --- 神社介面 --- */
        #shrine-system {
            display: none;
            flex: 1;
            padding: 100px 20px;
            flex-direction: column;
            align-items: center;
        }

        .fortune-card {
            background: rgba(10, 12, 15, 0.9);
            backdrop-filter: blur(20px);
            border: 2px solid var(--theme-color);
            border-radius: 24px;
            padding: 50px 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .shrine-box-vis {
            width: 70px; height: 100px;
            background: var(--theme-color);
            margin: 0 auto 30px;
            border-radius: 6px;
            box-shadow: 0 0 20px var(--theme-color);
        }
        .shaking { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(2px, -2px); } }

        .draw-btn {
            background: transparent;
            border: 1px solid var(--theme-color);
            color: var(--theme-color);
            padding: 14px 60px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.3s;
            margin-top: 20px;
            position: relative;
            z-index: 100; /* 確保按鈕在 Canvas 下面但仍可點擊 */
        }
        .draw-btn:hover:not(:disabled) { background: var(--theme-color); color: #000; }

        .result-box { text-align: left; animation: fadeIn 0.6s forwards; }
        .result-title { font-size: 2.2rem; text-align: center; margin-bottom: 25px; display: block; font-weight: 900; }
        .item { margin-bottom: 15px; font-size: 1rem; color: #ddd; line-height: 1.6; }
        .item b { color: #fff; border-left: 4px solid var(--theme-color); padding-left: 12px; margin-right: 10px; }

        .bottom-footer {
            padding: 30px 0;
            border-top: 1px solid var(--glass-border);
            text-align: center;
        }
        .footer-grid { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
        .footer-item { font-size: 0.8rem; color: #666; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .constellation-list {
            font-size: 0.85rem;
            color: #888;
            margin-top: 8px;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        .element-card:hover .constellation-list {
            color: #fff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }

        .element-card h3 {
            margin-bottom: 0;
        }
    </style>
</head>

    <script>
        // --- 1. 特效系統 (修正處：強化繪圖邏輯) ---
        const canvas = document.getElementById('magic-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [], ripples = [], themeColor = '#7dd3fc';

        function resize() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
        }
        window.addEventListener('resize', resize); 
        resize();

        // 修正：mousemove 偵測
        window.addEventListener('mousemove', e => {
            for(let i=0; i<1; i++) {
                particles.push(new Particle(e.clientX, e.clientY, false));
            }
        });

        // 修正：click 偵測 (點擊時會有漣漪與爆裂)
        window.addEventListener('click', e => {
            ripples.push(new Ripple(e.clientX, e.clientY));
            for(let i=0; i<15; i++) {
                particles.push(new Particle(e.clientX, e.clientY, true));
            }
        });

        class Particle {
            constructor(x, y, isBurst = false) {
                this.x = x; this.y = y; this.life = 1;
                this.decay = isBurst ? Math.random() * 0.02 + 0.015 : 0.03;
                this.size = isBurst ? Math.random() * 3 + 1 : Math.random() * 1.5 + 0.5;
                const angle = Math.random() * Math.PI * 2;
                const force = isBurst ? Math.random() * 4 + 2 : Math.random() * 1;
                this.speedX = Math.cos(angle) * force;
                this.speedY = Math.sin(angle) * force;
                this.color = themeColor;
            }
            update() { 
                this.x += this.speedX; 
                this.y += this.speedY; 
                this.life -= this.decay; 
            }
            draw() {
                if (this.life <= 0) return;
                const alpha = Math.floor(this.life * 255).toString(16).padStart(2, '0');
                ctx.fillStyle = this.color + alpha;
                ctx.beginPath(); 
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); 
                ctx.fill();
            }
        }

        class Ripple {
            constructor(x, y) { 
                this.x = x; this.y = y; this.radius = 1; this.life = 1; 
                this.color = themeColor;
            }
            update() { this.radius += 4; this.life -= 0.02; }
            draw() {
                if (this.life <= 0) return;
                const alpha = Math.floor(this.life * 150).toString(16).padStart(2, '0');
                ctx.strokeStyle = this.color + alpha;
                ctx.lineWidth = 2; 
                ctx.beginPath(); 
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); 
                ctx.stroke();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => { p.update(); p.draw(); });
            
            ripples = ripples.filter(r => r.life > 0);
            ripples.forEach(r => { r.update(); r.draw(); });
            
            requestAnimationFrame(animate);
        }
        animate();

        let currentElement = 'fire';

        // --- 3. 神社邏輯 ---
        function openShrine(el, color) {
            currentElement = el; 
            themeColor = color;
            document.documentElement.style.setProperty('--theme-color', color);
            document.getElementById('entry-system').style.display = 'none';
            document.getElementById('shrine-system').style.display = 'flex';
            document.getElementById('shrine-title').innerText = pools[el].title;
        }

        function draw() {
            const btn = document.getElementById('draw-btn');
            const display = document.getElementById('display-area');
            btn.disabled = true;
            display.innerHTML = `<div class="shrine-box-vis shaking"></div>`;
            
            // 點擊特效加強
            for(let i=0; i<30; i++) particles.push(new Particle(window.innerWidth/2, window.innerHeight/2, true));

            setTimeout(() => {
                const isSpecial = Math.random() < 0.05;
                const levels = ["大吉", "吉", "小吉", "末吉", "小凶", "凶", "大凶"];
                const lvl = isSpecial ? (Math.random() > 0.5 ? "極大吉" : "極大凶") : levels[Math.floor(Math.random() * levels.length)];
                
                const isGood = !lvl.includes("凶");
                const filtered = pools[currentElement].items.filter(i => i.type === (isGood ? "good" : "bad"));
                const data = filtered[Math.floor(Math.random() * filtered.length)];

                const lvlColor = isGood ? "var(--theme-color)" : "#ff6b6b";
                const labelD = isGood ? "策略" : "避邪";
                const labelS = isGood ? "日常" : "守成";

                let html = "";
                if(lvl.includes("極")) {
                    html = `
                        <div class="result-box" style="text-align:center;">
                            <span class="result-title" style="color:${lvlColor}; text-shadow: 0 0 20px ${lvlColor};">【${lvl}】</span>
                            <p style="color:#fff; margin-bottom: 10px;">宇宙能量產生劇烈波動！<br>請贊助作者 200 NTD 以平衡因果。</p>
                            <b style="color:${lvlColor}; font-size:0.9rem;">(822) 中國信託<br>帳號：99821-XXXXX</b>
                            <div style="margin-top: 20px; padding-top: 15px; border-top: 1px dashed rgba(255,255,255,0.2);">
                                <p style="font-size: 0.8rem; color: #aaa; line-height: 1.4;">
                                    ＊以上純屬玩笑，請勿當真＊<br>
                                    抽中此籤機率僅 <b style="color:#fff;">5%</b>，代表你今天的運氣<br>
                                    要麼極致強大，要麼極致混亂！<br>
                                    <span style="color:var(--theme-color); font-weight:bold; font-size:1rem;">⚡ 觸發極限回饋：獎勵你再來一籤！</span>
                                </p>
                            </div>
                        </div>`;
                } else {
                    html = `
                        <div class="result-box">
                            <span class="result-title" style="color:${lvlColor}">【${lvl}】</span>
                            <div class="item"><b>願望</b> ${data.w}</div>
                            <div class="item"><b>${labelS}</b> ${data.s}</div>
                            <div class="item"><b>愛情</b> ${data.l}</div>
                            <div class="item" style="background:rgba(255,255,255,0.05); padding:12px; border-radius:10px;">
                                <b style="color:${lvlColor}">${labelD}</b> ${data.d}
                            </div>
                        </div>`;
                }

                display.innerHTML = html;
                btn.disabled = false; 
                btn.innerText = lvl.includes("極") ? "領取獎勵：再求一籤" : "再求一籤";
                ripples.push(new Ripple(window.innerWidth/2, window.innerHeight/2));
                
            }, 1200);
        }
