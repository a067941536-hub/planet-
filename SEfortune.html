            border-radius: 20px;

        .wind { width: 50px; height: 50px; border: 2px dashed #99ffcc; border-radius: 50%; animation: rotate 3s linear infinite; }

        @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.6; } 100% { transform: scale(1.3); opacity: 0; } }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes morph { from { border-radius: 40% 60% 70% 30%; } to { border-radius: 70% 30% 30% 70%; } }

        // --- 1. 特效系統 ---
        const canvas = document.getElementById('magic-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [], ripples = [], themeColor = '#7dd3fc';

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        window.addEventListener('mousemove', e => particles.push(new Particle(e.clientX, e.clientY)));
        window.addEventListener('click', e => {
            ripples.push(new Ripple(e.clientX, e.clientY));
            for(let i=0; i<15; i++) particles.push(new Particle(e.clientX, e.clientY, true));
        });

        class Particle {
            constructor(x, y, isBurst = false) {
                this.x = x; this.y = y; this.life = 1;
                this.decay = isBurst ? 0.02 : 0.015;
                this.size = isBurst ? Math.random() * 4 + 1 : Math.random() * 1.5;
                this.speedX = (Math.random() - 0.5) * (isBurst ? 8 : 2);
                this.speedY = (Math.random() - 0.5) * (isBurst ? 8 : 2);
                this.color = themeColor;
            }
            update() { this.x += this.speedX; this.y += this.speedY; this.life -= this.decay; }
            draw() {
                ctx.fillStyle = this.color + Math.floor(this.life * 255).toString(16).padStart(2, '0');
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        class Ripple {
            constructor(x, y) { this.x = x; this.y = y; this.radius = 1; this.life = 1; }
            update() { this.radius += 4; this.life -= 0.02; }
            draw() {
                ctx.strokeStyle = themeColor + Math.floor(this.life * 150).toString(16).padStart(2, '0');
                ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.stroke();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => { p.update(); p.draw(); });
            ripples = ripples.filter(r => r.life > 0);
            ripples.forEach(r => { r.update(); r.draw(); });
            requestAnimationFrame(animate);
        }

        // --- 3. 神社邏輯 ---
        function openShrine(el, color) {
            currentElement = el; themeColor = color;
            document.documentElement.style.setProperty('--theme-color', color);
            document.getElementById('entry-system').style.display = 'none';
            document.getElementById('shrine-system').style.display = 'flex';
            document.getElementById('shrine-title').innerText = pools[el].title;
        }

        function draw() {
            const btn = document.getElementById('draw-btn');
            const display = document.getElementById('display-area');
            btn.disabled = true;
            display.innerHTML = `<div class="shrine-box-vis shaking"></div>`;
            for(let i=0; i<20; i++) particles.push(new Particle(window.innerWidth/2, window.innerHeight/2, true));

            setTimeout(() => {
                // 等級隨機 (大吉~大兇)
                const isSpecial = Math.random() < 0.05;
                const levels = ["大吉", "吉", "小吉", "末吉", "小兇", "兇", "大兇"];
                const lvl = isSpecial ? (Math.random() > 0.5 ? "極大吉" : "極大兇") : levels[Math.floor(Math.random() * levels.length)];
                
                // 根據等級正負向過濾 pool
                const isGood = !lvl.includes("兇");
                const filtered = pools[currentElement].items.filter(i => i.type === (isGood ? "good" : "bad"));
                const data = filtered[Math.floor(Math.random() * filtered.length)];

                // 根據等級調整標題顏色與建議名稱
                const lvlColor = isGood ? "var(--theme-color)" : "#ff6b6b";
                const labelD = isGood ? "策略" : "避邪";
                const labelS = isGood ? "日常" : "守成";

// 5. 渲染 HTML
       let html = "";
        if(lvl.includes("極")) {
            html = `
                <div class="result-box" style="text-align:center;">
                    <span class="result-title" style="color:${lvlColor}; text-shadow: 0 0 20px ${lvlColor};">【${lvl}】</span>
                    <p style="color:#fff; margin-bottom: 10px;">宇宙能量產生劇烈波動！<br>請贊助作者 200 NTD 以平衡因果。</p>
                    <b style="color:${lvlColor}; font-size:0.9rem;">(822) 中國信託<br>帳號：99821-XXXXX</b>
                    
                    <div style="margin-top: 20px; padding-top: 15px; border-top: 1px dashed rgba(255,255,255,0.2);">
                        <p style="font-size: 0.8rem; color: #aaa; line-height: 1.4;">
                            ＊以上純屬玩笑，請勿當真＊<br>
                            抽中此籤機率僅 <b style="color:#fff;">5%</b>，代表你今天的運氣<br>
                            要麼極致強大，要麼極致混亂！<br>
                            <span style="color:var(--theme-color); font-weight:bold; font-size:1rem;">⚡ 觸發極限回饋：獎勵你再來一籤！</span>
                        </p>
                    </div>
                </div>`;
        } else {
            html = `
                <div class="result-box">
                    <span class="result-title" style="color:${lvlColor}">【${lvl}】</span>
                    <div class="item"><b>願望</b> ${data.w}</div>
                    <div class="item"><b>${labelS}</b> ${data.s}</div>
                    <div class="item"><b>愛情</b> ${data.l}</div>
                    <div class="item" style="background:rgba(255,255,255,0.05); padding:12px; border-radius:10px;">
                        <b style="color:${lvlColor}">${labelD}</b> ${data.d}
                    </div>
                </div>`;
        }

        display.innerHTML = html;
        btn.disabled = false; 
        
        // 如果是極限籤，按鈕文字變得更誘人
        if(lvl.includes("極")) {
            btn.innerText = "領取獎勵：再求一籤";
            btn.style.boxShadow = `0 0 20px ${lvlColor}`; // 讓按鈕發光
        } else {
            btn.innerText = "再求一籤";
            btn.style.boxShadow = "none";
        }
        
        ripples.push(new Ripple(window.innerWidth/2, window.innerHeight/2));

        // 6. 更新介面與恢復狀態
        display.innerHTML = html;
        btn.disabled = false; 
        btn.innerText = "再求一籤";
        ripples.push(new Ripple(window.innerWidth/2, window.innerHeight/2));
        
    }, 1200);
