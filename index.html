    <script>
        // ==========================================
        // --- 特效 PART 1: 游標拖曳尾跡 & 點擊效果 ---
        // ==========================================
        const canvas = document.getElementById('magic-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        let clickRipples = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('mousemove', (e) => {
            for (let i = 0; i < 3; i++) {
                particles.push(new Particle(e.clientX, e.clientY));
            }
        });

        window.addEventListener('click', (e) => {
            clickRipples.push(new Ripple(e.clientX, e.clientY));
            for(let i=0; i<8; i++) {
                particles.push(new Particle(e.clientX, e.clientY, true)); 
            }
        });

        class Particle {
            constructor(x, y, isClickStar = false) {
                this.x = x;
                this.y = y;
                this.isClickStar = isClickStar;
                const hue = isClickStar ? 280 : (Math.random() < 0.8 ? 50 : 280); 
                this.color = `hsla(${hue}, 90%, 70%, `; 
                this.size = isClickStar ? Math.random() * 4 + 2 : Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * (isClickStar ? 4 : 1.5);
                this.speedY = isClickStar ? (Math.random() * -3 - 1) : (Math.random() * -1 - 0.2);
                this.life = 1;
                this.decay = isClickStar ? 0.015 : Math.random() * 0.02 + 0.01;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if(this.isClickStar) { this.speedX *= 0.98; this.speedY *= 0.98; }
                this.life -= this.decay;
                if(this.life < 0) this.life = 0;
            }
            draw() {
                ctx.globalCompositeOperation = 'lighter';
                ctx.fillStyle = this.color + this.life + ')';
                ctx.shadowBlur = this.isClickStar ? 12 : 5;
                ctx.shadowColor = this.color + '0.5)';
                ctx.beginPath();
                if(this.isClickStar) {
                    this.drawStar(ctx, this.x, this.y, 4, this.size, this.size/2);
                } else {
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                }
                ctx.fill();
                ctx.globalCompositeOperation = 'source-over';
                ctx.shadowBlur = 0;
            }
            drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
                let rot = Math.PI / 2 * 3;
                let x = cx, y = cy, step = Math.PI / spikes;
                ctx.beginPath(); ctx.moveTo(cx, cy - outerRadius);
                for (let i = 0; i < spikes; i++) {
                    x = cx + Math.cos(rot) * outerRadius; y = cy + Math.sin(rot) * outerRadius;
                    ctx.lineTo(x, y); rot += step;
                    x = cx + Math.cos(rot) * innerRadius; y = cy + Math.sin(rot) * innerRadius;
                    ctx.lineTo(x, y); rot += step;
                }
                ctx.lineTo(cx, cy - outerRadius); ctx.closePath();
            }
        }

        class Ripple {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.radius = 1; this.maxRadius = 70;
                this.color = 'hsla(280, 90%, 60%, ';
                this.life = 1; this.decay = 0.025;
            }
            update() {
                this.radius += (this.maxRadius - this.radius) * 0.1;
                this.life -= this.decay;
                if(this.life < 0) this.life = 0;
            }
            draw() {
                ctx.strokeStyle = this.color + this.life + ')';
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.stroke();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(); particles[i].draw();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
            for (let i = clickRipples.length - 1; i >= 0; i--) {
                clickRipples[i].update(); clickRipples[i].draw();
                if (clickRipples[i].life <= 0) clickRipples.splice(i, 1);
            }
            requestAnimationFrame(animate);
        }
        animate();

        // ==========================================
        // --- 特效 PART 2: 原有的輪播與 NASA 邏輯 ---
        // ==========================================
        const slider = document.getElementById('main-slider');
        const dots = document.querySelectorAll('.dot');
        let currentIndex = 0;

        function updateDots(index) {
            dots.forEach(dot => dot.classList.remove('active'));
            dots[index].classList.add('active');
        }

        function goToSlide(index) {
            currentIndex = index;
            const width = slider.clientWidth;
            slider.scrollTo({ left: width * index, behavior: 'smooth' });
            updateDots(index);
        }

        function autoPlay() {
            currentIndex = (currentIndex + 1) % dots.length;
            goToSlide(currentIndex);
        }

        let timer = setInterval(autoPlay, 5000);

        slider.addEventListener('scroll', () => {
            const index = Math.round(slider.scrollLeft / slider.clientWidth);
            updateDots(index);
            currentIndex = index;
        });
    
        async function updateDailySpacePhoto() {
            try {
                const apiKey = 'bbnI97f3gYfi5VjW3flIMexoyBF18Ca86rbJDXh5';
                const apiUrl = `https://api.nasa.gov/planetary/apod?api_key=${apiKey}&thumbs=true`;
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('API request failed');
                const data = await response.json();
                const imgElement = document.getElementById('nasa-img');
                const titleElement = document.getElementById('nasa-title');

                if (data.media_type === 'image') {
                    imgElement.src = data.url; 
                    titleElement.innerText = "今日太空：" + data.title;
                } else if (data.media_type === 'video') {
                    imgElement.src = data.thumbnail_url || "https://images-assets.nasa.gov/image/PIA12348/PIA12348~medium.jpg";
                    titleElement.innerText = "今日影音：" + data.title + " (點擊查看影片)";
                }
            } catch (error) {
                console.log("NASA 照片載入失敗：", error);
                document.getElementById('nasa-img').src = "https://via.placeholder.com/1000x500/0a0515/ffffff?text=Universe+Is+Waiting";
            }
        }

        window.addEventListener('DOMContentLoaded', updateDailySpacePhoto);
    </script>
